# GPU override — apply on an NVIDIA host (needs nvidia-container-toolkit installed).
#
#   docker compose -f docker-compose.yaml -f docker-compose.gpu.yaml up -d
#
# IMPORTANT: the default image (Dockerfile) ships CPU-only PyTorch, so this
# override alone will NOT give you real GPU speed. For local GPU inference pick one:
#
#   (a) Remote model (recommended, simplest): leave this override off, set
#       MINERU_BACKEND=vlm-http-client and MINERU_VLM_SERVER_URL=http://gpu-host:30000
#       in .env. The heavy VLM runs on the GPU box; this stays a thin client.
#
#   (b) Local GPU: build MinerU's official CUDA image and point `image:` below at it
#       (see https://github.com/opendatalab/MinerU/tree/master/docker), then this
#       override wires up the GPU reservation + cuda device mode.
services:
  mineru-api:
    # Uncomment and set after building MinerU's official CUDA image for option (b):
    # image: mineru:latest
    environment:
      MINERU_DEVICE_MODE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
