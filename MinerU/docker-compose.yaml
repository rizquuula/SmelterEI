# MinerU HTTP API — default = CPU, runs on this machine.
# All knobs live in .env (copy from .env.example).
#
#   docker compose up -d --build      # start (builds the CPU image first time)
#   docker compose logs -f            # watch
#   docker compose down               # stop
#
# GPU host? add the override:
#   docker compose -f docker-compose.yaml -f docker-compose.gpu.yaml up -d
services:
  mineru-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: smelterei/mineru-api:cpu
    container_name: mineru-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MINERU_API_PORT:-8000}:8000"
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-huggingface}
      MINERU_DEVICE_MODE: ${MINERU_DEVICE_MODE:-cpu}
      MINERU_FORMULA_ENABLE: ${MINERU_FORMULA_ENABLE:-true}
      MINERU_TABLE_ENABLE: ${MINERU_TABLE_ENABLE:-true}
      MINERU_API_MAX_CONCURRENT_REQUESTS: ${MINERU_API_MAX_CONCURRENT_REQUESTS:-3}
    volumes:
      # Model cache — first run downloads a few GB here; persists across restarts.
      - ${MINERU_MODELS_DIR:-./models}:/root/.cache
      # Optional output dir (used if you also run the mineru CLI inside the container).
      - ${MINERU_OUTPUT_DIR:-./output}:/output
    shm_size: "8gb"
    healthcheck:
      # FastAPI always serves /docs; treat that as "up".
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First boot may download models — give it room before marking unhealthy.
      start_period: 300s
